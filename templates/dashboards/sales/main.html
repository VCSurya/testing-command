<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales Dashboard</title>
    <link rel="icon" href="{{ url_for('static', filename='logo.ico') }}" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
        xintegrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <script src="{{url_for('static',filename='tailwind.js')}}"></script>

    <style>
        :root {
            --primary: #1e2857;
            --secondary: #1e094d;
            --success: #4cc9f0;
            --warning: #f72585;
            --info: #7209b7;
            --dark: #2b2d42;
            --light: #f8f9fa;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f4f5f7;
            color: #1f2937;
        }


        /* Sidebar styles */
        .row.g-0 {
            height: 100vh;
            display: flex;
        }

        #sidebarToggle {
            background-color: var(--secondary);
            color: white;
            border: 1px solid var(--secondary);
        }


        #sidebar {
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            min-width: 30vh;
            max-width: 40vh;
            background: linear-gradient(to bottom, var(--secondary), var(--primary));
            transform: translateX(-100%);
            transition: transform 0.3s ease-in-out;
            z-index: 1050;
            box-shadow: 2px 0 5px rgba(0, 0, 0, 0.1);
        }

        #sidebar.active {
            transform: translateX(0);
        }

        .main-content {
            height: 100vh;
            overflow-y: auto;
            padding: 0;
            scrollbar-width: none;
            -ms-overflow-style: none;
            width: 100%;
            /* z-index: 1050; */

        }

        .main-content::-webkit-scrollbar {
            display: none;
            /* Chrome, Safari, Opera */
        }

        .sidebar-logo {
            padding: 0 0 10px 0;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo-text {
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            letter-spacing: 1px;
            font-size: 1.3em;
        }

        .nav-link {
            color: rgba(255, 255, 255, 0.8);
            border-radius: 8px;
            margin: 0.25rem 0;
            padding: 0.75rem 1rem;
            transition: all 0.3s;
        }

        .nav-link:hover,
        .nav-link.active {
            background-color: rgba(255, 255, 255, 0.15);
            color: white;
            transform: translateX(5px);
        }

        /* Header */
        .header-container {
            background-color: white;
            /* border-radius: 12px; */
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
            padding: 1rem;
            /* margin-bottom: 1.5rem; */
            position: fixed;
            width: 100%;
            z-index: 1000;
        }

        /* Responsive */
        .mobile-toggle {
            display: none;
        }

        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 1040;
        }

        .overlay.show {
            display: block;
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: 500;
            transition: all 0.3s;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            min-width: 44px;
            min-height: 44px;
            font-size: 1rem;
        }

        .btn-primary {
            background-color: var(--primary);
            border-color: var(--primary);
        }

        .btn-primary:hover {
            background-color: var(--secondary);
            border-color: var(--secondary);
            transform: translateY(-2px);
        }

        .btn-secondary {
            background-color: #6c757d;
            border-color: #6c757d;
        }

        .btn-danger {
            background-color: #dc3545;
            border-color: #dc3545;
        }

        .btn-sm {
            padding: 0.5rem 1rem;
            font-size: 0.875rem;
        }

        @media (max-width: 991.98px) {

            #sidebarToggle {
                margin-left: 10px;
                margin-top: 10px;
            }

            .sidebar {
                position: fixed;
                z-index: 1050;
                left: -260px;
                width: 260px !important;
            }

            .sidebar.show {
                left: 0;
            }

            .profile-menu {
                display: none;
            }

            .main-content {
                width: 100% !important;
                margin-left: 0 !important;
            }

            .mobile-toggle {
                display: block;
            }

            .overlay {
                display: none;
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background-color: rgba(0, 0, 0, 0.5);
                z-index: 1040;
            }

            .overlay.show {
                display: block;
            }

            .header-container {
                padding: 0;
            }

            .btn {
                width: 0%;
                margin-bottom: 0.5rem;
            }

            .d-flex.gap-2 {
                flex-direction: column;
            }

            .d-flex.gap-2 .btn {
                margin-bottom: 0.5rem;
            }
        }

        @media (max-width: 767.98px) {

            .btn {
                width: 0%;
                margin-bottom: 0.5rem;
                font-size: 1.05rem;
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
 
    <style>
        .user-card {
            display: flex;
            align-items: center;
            background: #e6dbff23;
            padding: 15px 20px;
            border-radius: 12px;
            gap: 15px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
            width: 88%;
            position: absolute;
            bottom: 20px;
        }

        .user-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-weight: 600;
            font-size: 1.2em;
            flex-shrink: 0;
        }

        .user-info {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .user-name {
            font-weight: 600;
            color: #ffffff;
            font-size: 1.1em;
        }

        .user-status {
            font-size: 0.9em;
            color: #ffffff;
        }
    </style>
</head>

<body>
    <!-- Mobile sidebar overlay -->
    <div class="overlay" id="sidebarOverlay"></div>

    <div class="container-fluid p-0">
        <div class="row g-0">
            <!-- Sidebar -->
            <div class="col-lg-2 sidebar p-3" id="sidebar">
                <div class="sidebar-logo mb-4 d-flex">
                    <i class="bi bi-list fs-4 text-white" id="hideButton"></i>
                    <div
                        style="display: flex; justify-content: center; align-items: center; width: 100%;font-size: 1.3em;">
                        <h3 class="logo-text text-white">
                            Sales<span class="text-warning">Pro</span>
                        </h3>
                    </div>
                </div>

                <ul class="nav flex-column">
                    <li class="nav-item">
                        <a class="nav-link active" href="/salespro/sales/dashboard"><i
                                class="bi bi-speedometer2 me-2"></i>Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link " href="/salespro/sales/sell"><i class="bi bi-graph-up me-2"></i>Selling</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/salespro/sales/ready-to-go-orders"><i
                                class="bi bi-clipboard-check me-2"></i>Draft Orders</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/salespro/sales/my-orders"><i class="bi bi-box-seam me-2"></i>My Orders</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link " href="/salespro/sales/cancel-orders">
                            <i class="bi bi-x-circle me-2"></i>Canceled
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link " href="/salespro/builty/ready-to-gos">
                            <i class="bi bi-journal-text me-2"></i>Builty
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link " href="/salespro/sales/payments">
                            <i class="bi bi-credit-card me-2"></i>Payments
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link " href="/salespro/logout">
                            <i class="bi bi-box-arrow-right me-2"></i>Log out
                        </a>
                    </li>
                </ul>


                <div class="user-card">
                    <div class="user-avatar align-items-center d-flex justify.btn">
                        <i class="fas fa-user me"></i>
                    </div>
                    <div class="user-info">
                        <div class="user-name">{{ session.get('username', 'Sales Manager') }}</div>
                        <div class="user-status">Sales</div>
                    </div>
                </div>

            </div>

            <!-- Main Content -->
            <div class="col-lg-10 p-0 main-content">

                <div class="header-container flex items-center justify-between w-full bg-white border-b shadow-sm">

                    <div class="d-flex align-items-center justify-content-between p-0">

                        <button class="btn btn-outline-primary me-2 p-0" id="sidebarToggle" title="Menu">
                            <i class="bi bi-list fs-5"></i>
                        </button>

                        <h4 class="mb-0 fw-semibold text" style="font-size: 2em;">Sales Overview</h4>
                    </div>

                    <!-- Right Side: The Adaptive Button -->
                    <div class="flex items-center mr-2">
                        <button onclick="window.location.href='/salespro/sales/sell'"
                            class="flex items-center justify-center gap-2 px-3 py-2 text-white transition-all bg-blue-600 rounded-lg hover:bg-blue-700 active:scale-95 sm:px-4"
                            title="Start Selling">
                            <!-- Icon: Changed to shopping-bag -->
                            <i class="fas fa-shopping-bag"></i>

                            <!-- Text: Hidden on mobile (default), visible on small screens (sm) and above -->
                            <span class="hidden font-medium sm:block">
                                Start Selling
                            </span>
                        </button>
                    </div>

                </div>

                <div class="container-fluid px-4" style="padding-top: 100px;padding-bottom: 30px;">

                    <div id="sales-dashboard-component">

                        <div id="loading-state" class="space-y-6">
                            <!-- Top Cards Skeleton -->
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div
                                    class="bg-white rounded-xl p-6 border-b-4 border-slate-200 card-shadow animate-pulse">
                                    <div class="h-3 w-24 bg-slate-200 rounded mb-4"></div>
                                    <div class="h-10 w-12 bg-slate-200 rounded"></div>
                                </div>
                                <div
                                    class="bg-white rounded-xl p-6 border-b-4 border-slate-200 card-shadow animate-pulse">
                                    <div class="h-3 w-28 bg-slate-200 rounded mb-4"></div>
                                    <div class="h-10 w-48 bg-slate-200 rounded"></div>
                                </div>
                            </div>

                            <!-- List Skeleton -->
                            <div
                                class="bg-white rounded-xl overflow-hidden card-shadow border border-slate-100 animate-pulse">
                                <div class="grid grid-cols-2 px-6 py-4 bg-slate-50/50 border-b border-slate-100">
                                    <div class="h-3 w-20 bg-slate-200 rounded"></div>
                                    <div class="h-3 w-12 bg-slate-200 rounded justify-self-end"></div>
                                </div>
                                <div class="divide-y divide-slate-100">
                                    <!-- Repeat for rows -->
                                    <div class="grid grid-cols-2 items-center px-6 py-5" sx-for="i in 4">
                                        <div class="flex items-center gap-4">
                                            <div class="w-10 h-10 bg-slate-100 rounded-lg"></div>
                                            <div class="h-4 w-32 bg-slate-100 rounded"></div>
                                        </div>
                                        <div class="h-6 w-8 bg-slate-100 rounded justify-self-end"></div>
                                    </div>
                                    <div class="grid grid-cols-2 items-center px-6 py-5">
                                        <div class="flex items-center gap-4">
                                            <div class="w-10 h-10 bg-slate-100 rounded-lg"></div>
                                            <div class="h-4 w-28 bg-slate-100 rounded"></div>
                                        </div>
                                        <div class="h-6 w-6 bg-slate-100 rounded justify-self-end"></div>
                                    </div>
                                </div>
                            </div>
                        </div>

                    </div>

                </div>

            </div>
        </div>
    </div>


    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const toggleBtn = document.getElementById('sidebarToggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            const hideButton = document.getElementById('hideButton');

            // Toggle sidebar open/close
            if (toggleBtn) {
                toggleBtn.addEventListener('click', () => {
                    sidebar.classList.toggle('active');
                    document.body.classList.toggle('sidebar-open');
                    overlay.classList.toggle('show');
                });
            }

            // Hide sidebar function (reusable)
            function hideSidebar() {
                sidebar.classList.remove('active', 'show');
                document.body.classList.remove('sidebar-open');
                overlay.classList.remove('show');
            }

            // Hide when clicking on overlay
            if (overlay) {
                overlay.addEventListener('click', hideSidebar);
            }

            // Hide when clicking on the hide button
            if (hideButton) {
                hideButton.addEventListener('click', hideSidebar);
            }
        });
    </script>

    <script>

        const fetchSalesData = async (userId) => {
            try {

                const response = await fetch(`/salespro/sales/dasebored-data`);

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const apiResponse = await response.json();

                return apiResponse;

            } catch (error) {
                console.error("Failed to fetch sales data:", error);
                return null;
            }
        };


        const renderSalesDashboard = async (containerId) => {
            const container = document.getElementById(containerId);
            if (!container) return console.error(`Container ID #${containerId} not found.`);

            try {
                const apiData = await fetchSalesData();

                if (apiData.success) {
                    container.innerHTML = `
                            <!-- Top Summary Cards -->
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                
                                <!-- Today's Sales Card -->
                                <div class="bg-white rounded-xl p-6 border-b-4 border-blue-500 card-shadow">
                                    <p class="text-[10px] font-bold text-blue-600 uppercase tracking-wider mb-2">Your Today's Sales</p>
                                    <h2 class="text-4xl md:text-5xl font-black text-slate-900">${apiData.data.today_order_count}</h2>
                                </div>

                                <!-- Today's Revenue Card -->
                                <div class="bg-white rounded-xl p-6 border-b-4 border-green-500 card-shadow">
                                    <p class="text-[10px] font-bold text-green-600 uppercase tracking-wider mb-2">Your Today's Revenue</p>
                                    <div class="flex items-baseline">
                                        <span class="text-3xl md:text-4xl font-black text-slate-900">${Number(apiData.data.today_order_sum).toLocaleString('en-US', {
                        style: 'currency',
                        currency: 'INR',
                        maximumFractionDigits: 0
                    })}
                                        </span>
                                    </div>
                                </div>

                            </div>
                            <br>
                            <!-- Orders Status Table-like List -->  
                            <div class="bg-white rounded-xl overflow-hidden card-shadow border border-slate-100">
                                <!-- Header -->
                                <div class="grid grid-cols-2 px-6 py-4 border-b border-slate-50 bg-slate-50/50">
                                    <span class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Your Orders Status</span>
                                    <span class="text-[10px] font-bold text-slate-500 uppercase tracking-widest text-right">Count</span>
                                </div>

                                <!-- List Items -->
                                <div class="divide-y divide-slate-100">
                                    
                                    <!-- Draft Orders -->
                                    <div class="grid grid-cols-2 items-center px-6 py-3 hover:bg-slate-50 transition-colors"
                                    onclick="window.location.href = '/salespro/sales/ready-to-go-orders'">
                                        <div class="flex items-center gap-4">
                                            <div class="w-10 h-10 flex items-center justify-center bg-slate-100 rounded-lg text-slate-500">
                                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>
                                            </div>
                                            <span class="font-bold text-slate-800 text-sm md:text-base">Draft Orders</span>
                                        </div>
                                        <span class="text-2xl font-black text-slate-900 text-right">${apiData.data.today_draft_order_count}</span>
                                    </div>

                                    <!-- In Process -->
                                    <div class="grid grid-cols-2 items-center px-6 py-3 hover:bg-slate-50 transition-colors"
                                    onclick="window.location.href = '/salespro/sales/my-orders'">
                                        <div class="flex items-center gap-4">
                                            <div class="w-10 h-10 flex items-center justify-center bg-orange-50 rounded-lg text-orange-500">
                                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>
                                            </div>
                                            <span class="font-bold text-slate-800 text-sm md:text-base">In Process...</span>
                                        </div>
                                        <span class="text-2xl font-black text-slate-900 text-right">${apiData.data.running_order_count}</span>
                                    </div>

                                    <!-- Bilty Orders -->
                                    <div class="grid grid-cols-2 items-center px-6 py-3 hover:bg-slate-50 transition-colors"
                                    onclick="window.location.href = '/salespro/builty/ready-to-gos'">
                                        <div class="flex items-center gap-4">
                                            <div class="w-10 h-10 flex items-center justify-center bg-green-50 rounded-lg text-green-500 border border-green-100">
                                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/></svg>
                                            </div>
                                            <span class="font-bold text-slate-800 text-sm md:text-base">Builty Orders</span>
                                        </div>
                                        <span class="text-2xl font-black text-slate-900 text-right">${apiData.data.total_draft_builty_order}</span>
                                    </div>

                                    <!-- Canceled Orders -->
                                    <div class="grid grid-cols-2 items-center px-6 py-6 bg-red-50/40 border-l-4 border-red-500"
                                    onclick="window.location.href = '/salespro/sales/cancel-orders'">
                                        <div class="flex items-center gap-4">
                                            <div class="md:ml-2">
                                                <span class="font-bold text-red-700 text-[11px] md:text-xs leading-tight">Canceled (Pending Confirmation)</span>
                                            </div>
                                        </div>
                                        <span class="text-3xl font-black text-red-700 text-right">${apiData.data.pending_cancelled_orders}</span>
                                    </div>
                                </div>
                            </div>

                `;

                } else {
                    console.error("Error fetching or rendering sales data:", apiData.error);
                    container.innerHTML = `
                    <div class="p-8 text-center text-xl text-red-500 bg-red-50 border border-red-200 shadow-lg rounded-xl max-w-lg mx-auto mt-20">
                        <i data-lucide="alert-triangle" class="w-8 h-8 text-red-600 mx-auto mb-3"></i>
                        Failed to load dashboard data. Please Try Again
                    </div>
                `;
                }

            } catch (error) {
                console.error("Error fetching or rendering sales data:", error);
                container.innerHTML = `
                    <div class="p-8 text-center text-xl text-red-500 bg-red-50 border border-red-200 shadow-lg rounded-xl max-w-lg mx-auto mt-20">
                        <i data-lucide="alert-triangle" class="w-8 h-8 text-red-600 mx-auto mb-3"></i>
                        Failed to load dashboard data. Please Try Again.
                    </div>
                `;
            }
        };

        /**
         * Initialization: Call the component function on page load.
         */
        window.onload = () => {
            renderSalesDashboard('sales-dashboard-component');
        };

    </script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        const socket = io("https://smarttraders.live", {
            path: "/salespro/socket.io/"
        });

        socket.on("force_logout", () => {
            // Optional: call logout endpoint
            window.location.href = "/salespro/logout";
        });
    </script>
</body>

</html>
